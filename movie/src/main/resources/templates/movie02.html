<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영화정보</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <style>
    .movieCd { cursor: pointer; text-decoration: underline;}
  </style>
</head>
<body>
  <div class="container">
    <div class="alert alert-primary"><h3 class="text-center">일별 박스오피스</h3></div>
    <div>
      <input class="form-controll">
      <button type="button">조회</button> 
    </div>
    <div class="row gx-5">
      <div class="col-md-6">
        <table class="table table-striped table-sm">
          <thead>
            <tr><td>랭킹</td><td>영화코드</td><td>영화명</td><td>개봉일자</td></tr>
          </thead>
          <tbody id="list"></tbody>
        </table>
      </div>
      <div class="col-md-6">
        <div class="row mb-4">
          <label class="col-md-3 col-form-label">영화코드</label>
          <div class="col-md-9">
            <input class="form-control" id="txtMovieCd">
          </div>
        </div>
        <div class="row mb-4">
          <label class="col-md-3 col-form-label">영화명</label>
          <div class="col-md-9">
            <input class="form-control" id="movieNm">
          </div>
        </div>
        <div class="row mb-4">
          <label class="col-md-3 col-form-label">개봉일자</label>
          <div class="col-md-9">
            <input class="form-control" id="openDt">
          </div>
        </div>
        <div class="row mb-4">
          <label class="col-md-3 col-form-label">감독</label>
          <div class="col-md-9">
            <input class="form-control" id="directors">
          </div>
        </div>
        <div class="row mb-4">
          <label class="col-md-3 col-form-label">출연배우</label>
          <div class="col-md-9">
            <textarea class="form-control" style="height: 130px;" id="actors"></textarea>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>

  </script>
</body>
</html>
